<!--
  Template principal de la aplicación
  
  Contiene el layout base con toolbar y router outlet.
-->

<div class="app-container">
  <!-- Toolbar principal con diseño moderno -->
  <mat-toolbar class="app-toolbar">
    <div class="toolbar-content">
      <div class="toolbar-left">
        <mat-icon class="toolbar-icon">people</mat-icon>
        <span class="app-title">{{ title }}</span>
      </div>
      <div class="toolbar-right">
        <button mat-icon-button routerLink="/users" class="nav-button" title="Ir a lista de usuarios">
          <mat-icon>home</mat-icon>
        </button>
      </div>
    </div>
  </mat-toolbar>

  <!-- Contenido principal -->
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer moderno -->
  <footer class="app-footer">
    <div class="footer-content">
      <p class="footer-text">
        <mat-icon>code</mat-icon>
        <span>Desarrollado con Angular {{ currentYear }}</span>
        <span class="divider">|</span>
        <mat-icon>storage</mat-icon>
        <span>Datos en localStorage</span>
      </p>
    </div>
  </footer>
</div>

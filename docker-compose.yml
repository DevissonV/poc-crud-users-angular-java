services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crud-users-backend
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SQLITE_DB_PATH=/app/data/users.db
      - SERVER_PORT=8080
    networks:
      - crud-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crud-users-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crud-network
    restart: unless-stopped

volumes:
  sqlite-data:
    driver: local
    name: crud-users-sqlite-data

networks:
  crud-network:
    driver: bridge
    name: crud-users-network
